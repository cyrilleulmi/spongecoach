spring.application.name=spongecoach
spring.profiles.active=mock

spring.datasource.url=jdbc:postgresql://localhost:5432/spongecoach
spring.datasource.username=spongecoach
spring.datasource.password=spongecoach

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false

spring.liquibase.change-log=classpath:db/changelog/db.changelog-master.yaml

# Disable H2 console outside dev
spring.h2.console.enabled=false
