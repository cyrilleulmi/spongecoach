databaseChangeLog:
  - changeSet:
      id: 003-create-team-table
      author: spongecoach
      changes:
        - createTable:
            tableName: team
            columns:
              - column:
                  name: id
                  type: uuid
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: name
                  type: varchar(255)
                  constraints:
                    nullable: false
              - column:
                  name: club_id
                  type: uuid
                  constraints:
                    nullable: false
        - addForeignKeyConstraint:
            baseTableName: team
            baseColumnNames: club_id
            constraintName: fk_team_club
            referencedTableName: club
            referencedColumnNames: id
            onDelete: CASCADE
