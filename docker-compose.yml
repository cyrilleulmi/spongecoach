services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: spongecoach
      POSTGRES_USER: spongecoach
      POSTGRES_PASSWORD: spongecoach
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build: ./backend
    depends_on:
      - postgres
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/spongecoach
      SPRING_DATASOURCE_USERNAME: spongecoach
      SPRING_DATASOURCE_PASSWORD: spongecoach
    ports:
      - "8080:8080"

  frontend:
    build: ./frontend
    depends_on:
      - backend
    ports:
      - "4200:80"

volumes:
  postgres_data:
