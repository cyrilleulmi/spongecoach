databaseChangeLog:
  - changeSet:
      id: 001-create-club-table
      author: spongecoach
      changes:
        - createTable:
            tableName: club
            columns:
              - column:
                  name: id
                  type: uuid
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: name
                  type: varchar(255)
                  constraints:
                    nullable: false
              - column:
                  name: location
                  type: varchar(255)
                  constraints:
                    nullable: false
